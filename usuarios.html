<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ITLA API - Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/login.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><i class="bi bi-house-door-fill"></i> ITLA API</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContenido">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="eventos.html"><i class="bi bi-calendar-event"></i> Eventos</a></li>
          <li class="nav-item"><a class="nav-link" href="editoriales.html"><i class="bi bi-journal-bookmark-fill"></i> Editoriales</a></li>
          <li class="nav-item"><a class="nav-link active" href="usuarios.html"><i class="bi bi-person-lines-fill"></i> Usuarios</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="events-container">
    <div class="events-header">
      <div>
        <h2><i class="bi bi-person-lines-fill"></i> Gestión de Usuarios</h2>
        <p class="text-muted mb-0">Administra los usuarios registrados</p>
      </div>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">Usuario</span>
        <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>

    <div id="alertContainer"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <span class="text-muted">Total de usuarios: <span id="usuarioCount">0</span></span>
      </div>
      <button class="btn btn-primary" id="btnNuevoUsuario"><i class="bi bi-person-plus"></i> Nuevo Usuario</button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle" id="tablaUsuarios">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5" class="table-loading">
              <div class="spinner-border text-primary"></div>
              <div>Cargando usuarios...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth-check.js"></script>
  <script src="assets/js/usuarios.js"></script>
</body>
</html>
