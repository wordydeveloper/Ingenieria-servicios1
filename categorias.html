<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ITLA API - Categorías</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Tu hoja de estilos personalizada (si existe) -->
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><i class="bi bi-house-door-fill"></i> ITLA API</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContenido">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="eventos.html"><i class="bi bi-calendar-event"></i> Eventos</a></li>
          <li class="nav-item"><a class="nav-link active" href="categorias.html"><i class="bi bi-tags-fill"></i> Categorías</a></li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm ms-3" onclick="cerrarSesion()">
              <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container">
    <h2 class="mb-3">Gestión de Categorías</h2>

    <div class="mb-4 d-flex gap-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRegistrar">
        <i class="bi bi-plus-circle"></i> Nueva Categoría
      </button>
      <button class="btn btn-warning text-white" data-bs-toggle="modal" data-bs-target="#modalActualizar">
        <i class="bi bi-pencil-square"></i> Actualizar  Categoría
      </button>
    </div>

    <h3>Categorías Registradas</h3>
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tablaCategorias"></tbody>
    </table>
  </div>

  <!-- Modal Registrar -->
  <div class="modal fade" id="modalRegistrar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content rounded-4">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="bi bi-plus-circle"></i> Registrar Categoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="text" id="nombreCategoria" class="form-control mb-3" placeholder="Nombre de categoría">
          <select id="estadoCategoria" class="form-select">
            <option value="AC">Activo</option>
            <option value="IN">Inactivo</option>
          </select>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button class="btn btn-outline-secondary w-50 me-2" data-bs-dismiss="modal">
            <i class="bi bi-x-circle"></i> Cancelar
          </button>
          <button class="btn btn-success w-50" onclick="registrarCategoria()">
            <i class="bi bi-check-circle"></i> Registrar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Actualizar / Eliminar -->
  <div class="modal fade" id="modalActualizar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content rounded-4">
        <div class="modal-header text-white" style="background: linear-gradient(to right, #6a11cb, #2575fc);">
          <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i> Actualizar  Categoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body p-4">
          <label for="idCategoriaActualizar" class="form-label">ID de Categoría</label>
          <input type="number" id="idCategoriaActualizar" class="form-control mb-3" placeholder="Ej: 1">

          <div class="mb-3 text-center">
            <button class="btn btn-outline-info w-100" onclick="buscarCategoriaPorId()">
              <i class="bi bi-search"></i> Buscar por ID
            </button>
          </div>

          <label for="nombreCategoriaActualizar" class="form-label">Nombre</label>
          <input type="text" id="nombreCategoriaActualizar" class="form-control mb-3" placeholder="Nuevo nombre">

          <label for="estadoCategoriaActualizar" class="form-label">Estado</label>
          <select id="estadoCategoriaActualizar" class="form-select">
            <option value="AC">Activo</option>
            <option value="IN">Inactivo</option>
          </select>
        </div>
        <div class="modal-footer d-flex flex-column gap-2 px-4 pb-4">
                <button class="btn btn-warning text-white w-100" onclick="actualizarCategoria()">
            <i class="bi bi-arrow-clockwise"></i> Actualizar Categoría
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/helpers/AuthManager.js"></script>
  <script>
    function cerrarSesion() {
      AuthManager.logout();
      window.location.href = "login.html";
    }
  </script>
  <script src="assets/js/categorias.js"></script>
</body>
</html>
